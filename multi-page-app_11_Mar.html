<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Page App — React Router SPA</title>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ── Simple hash-based router (simulates React Router in a single file) ── */

    function useRoute() {
      const [path, setPath] = useState(window.location.hash.slice(1) || "/");
      useEffect(() => {
        const handler = () => setPath(window.location.hash.slice(1) || "/");
        window.addEventListener("hashchange", handler);
        return () => window.removeEventListener("hashchange", handler);
      }, []);
      return path;
    }

    function Link({ to, children, style }) {
      return (
        <a href={`#${to}`} style={{ textDecoration: "none", ...style }}>
          {children}
        </a>
      );
    }

    /* ── Styles ── */
    const styles = {
      body: { fontFamily: "'Segoe UI', system-ui, sans-serif", background: "#f1f5f9", minHeight: "100vh" },
      nav: {
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "0.75rem 2rem", background: "#fff",
        boxShadow: "0 1px 4px rgba(0,0,0,0.06)", position: "sticky", top: 0, zIndex: 10,
      },
      logo: { fontSize: "1.15rem", fontWeight: 700, color: "#4f46e5" },
      navLinks: { display: "flex", gap: "1.25rem", listStyle: "none", margin: 0, padding: 0 },
      navLink: (active) => ({
        fontSize: "0.9rem", fontWeight: 500,
        color: active ? "#4f46e5" : "#64748b",
        borderBottom: active ? "2px solid #4f46e5" : "2px solid transparent",
        paddingBottom: "0.2rem", transition: "all 0.2s",
      }),
      page: { maxWidth: "800px", margin: "0 auto", padding: "2rem 1.5rem" },
      card: {
        background: "#fff", borderRadius: "14px",
        boxShadow: "0 2px 12px rgba(0,0,0,0.06)", padding: "2rem", marginBottom: "1.5rem",
      },
      h1: { fontSize: "1.6rem", color: "#0f172a", marginBottom: "0.5rem" },
      h2: { fontSize: "1.15rem", color: "#334155", marginBottom: "0.5rem" },
      p: { fontSize: "0.95rem", color: "#475569", lineHeight: 1.7, marginBottom: "0.5rem" },
      grid: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: "1rem", marginTop: "1rem" },
      featureCard: (color) => ({
        padding: "1.25rem", borderRadius: "12px",
        background: color + "10", border: `1px solid ${color}30`, textAlign: "center",
      }),
      badge: { display: "inline-block", background: "#eef2ff", color: "#4338ca", fontSize: "0.78rem", fontWeight: 600, padding: "0.15rem 0.6rem", borderRadius: "4px", marginRight: "0.4rem", marginBottom: "0.3rem" },
      contactItem: { display: "flex", alignItems: "center", gap: "0.6rem", padding: "0.6rem 0", borderBottom: "1px solid #f1f5f9", fontSize: "0.9rem", color: "#475569" },
    };

    /* ── Pages ── */

    function HomePage() {
      const features = [
        { icon: "🏠", title: "Home", desc: "Landing page with overview", color: "#22c55e" },
        { icon: "👤", title: "About", desc: "Personal information", color: "#3b82f6" },
        { icon: "💼", title: "Projects", desc: "Work & project showcase", color: "#8b5cf6" },
        { icon: "📧", title: "Contact", desc: "Get in touch", color: "#f59e0b" },
      ];
      return (
        <div style={styles.page}>
          <div style={styles.card}>
            <h1 style={styles.h1}>Welcome to My Portfolio</h1>
            <p style={styles.p}>
              This is a multi-page Single Page Application built with React, demonstrating
              client-side routing. Navigate between pages using the links above — the page
              updates without a full reload.
            </p>
            <p style={{ ...styles.p, fontSize: "0.85rem", color: "#94a3b8" }}>
              Assignment — 11th March 2026
            </p>
          </div>
          <div style={styles.grid}>
            {features.map(f => (
              <div key={f.title} style={styles.featureCard(f.color)}>
                <div style={{ fontSize: "2rem", marginBottom: "0.5rem" }}>{f.icon}</div>
                <div style={{ fontWeight: 600, color: "#1e293b", fontSize: "0.95rem" }}>{f.title}</div>
                <div style={{ fontSize: "0.82rem", color: "#64748b", marginTop: "0.2rem" }}>{f.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AboutPage() {
      const skills = ["JavaScript", "React", "Node.js", "Next.js", "TypeScript", "PostgreSQL", "MongoDB", "Docker", "AWS", "Git"];
      return (
        <div style={styles.page}>
          <div style={styles.card}>
            <h1 style={styles.h1}>About Me</h1>
            <p style={styles.p}>
              I'm Soham Gupta, a B.E. student in Information Science and Engineering at
              Sir M Visvesvaraya Institute of Technology, Bangalore. I'm passionate about
              full stack web development and open source.
            </p>
            <h2 style={{ ...styles.h2, marginTop: "1rem" }}>Skills</h2>
            <div style={{ marginTop: "0.5rem" }}>
              {skills.map(s => <span key={s} style={styles.badge}>{s}</span>)}
            </div>
          </div>
        </div>
      );
    }

    function ProjectsPage() {
      const projects = [
        { name: "Huntify", desc: "AI-powered job assistant with streaming responses and credit billing.", tech: "Next.js, Google AI SDK, Drizzle" },
        { name: "RepoGPT", desc: "RAG pipeline for code comprehension with 95% retrieval accuracy.", tech: "tRPC, LangChain, Gemini AI" },
        { name: "Crypt", desc: "Anonymous community with infinite scroll and Redis caching.", tech: "Next.js, Redis, Prisma" },
      ];
      return (
        <div style={styles.page}>
          <h1 style={{ ...styles.h1, marginBottom: "1rem" }}>Projects</h1>
          {projects.map(p => (
            <div key={p.name} style={{ ...styles.card, marginBottom: "1rem" }}>
              <h2 style={styles.h2}>{p.name}</h2>
              <p style={styles.p}>{p.desc}</p>
              <p style={{ fontSize: "0.82rem", color: "#4f46e5", fontWeight: 500 }}>{p.tech}</p>
            </div>
          ))}
        </div>
      );
    }

    function ContactPage() {
      const contacts = [
        { icon: "📧", label: "Email", value: "soham.gupta003@gmail.com" },
        { icon: "💼", label: "LinkedIn", value: "linkedin.com/in/soham-gupta-in" },
        { icon: "🐙", label: "GitHub", value: "github.com/gupta-soham" },
      ];
      return (
        <div style={styles.page}>
          <div style={styles.card}>
            <h1 style={styles.h1}>Contact</h1>
            <p style={styles.p}>Feel free to reach out through any of the following channels.</p>
            <div style={{ marginTop: "1rem" }}>
              {contacts.map(c => (
                <div key={c.label} style={styles.contactItem}>
                  <span style={{ fontSize: "1.25rem" }}>{c.icon}</span>
                  <div>
                    <div style={{ fontWeight: 600, color: "#1e293b", fontSize: "0.9rem" }}>{c.label}</div>
                    <div style={{ color: "#64748b", fontSize: "0.85rem" }}>{c.value}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function NotFoundPage() {
      return (
        <div style={{ ...styles.page, textAlign: "center", paddingTop: "4rem" }}>
          <div style={{ fontSize: "4rem", marginBottom: "0.5rem" }}>404</div>
          <h1 style={styles.h1}>Page Not Found</h1>
          <p style={styles.p}>The page you're looking for doesn't exist.</p>
          <Link to="/" style={{ color: "#4f46e5", fontWeight: 600, fontSize: "0.95rem" }}>Go Home</Link>
        </div>
      );
    }

    /* ── App with Navigation ── */

    function App() {
      const path = useRoute();
      const navItems = [
        { to: "/", label: "Home" },
        { to: "/about", label: "About" },
        { to: "/projects", label: "Projects" },
        { to: "/contact", label: "Contact" },
      ];

      let Page;
      switch (path) {
        case "/":         Page = HomePage; break;
        case "/about":    Page = AboutPage; break;
        case "/projects": Page = ProjectsPage; break;
        case "/contact":  Page = ContactPage; break;
        default:          Page = NotFoundPage;
      }

      return (
        <div style={styles.body}>
          <nav style={styles.nav}>
            <Link to="/" style={styles.logo}>MyPortfolio</Link>
            <ul style={styles.navLinks}>
              {navItems.map(item => (
                <li key={item.to}>
                  <Link to={item.to} style={styles.navLink(path === item.to)}>
                    {item.label}
                  </Link>
                </li>
              ))}
            </ul>
          </nav>
          <Page />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
