<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Tracker — React App</title>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const moods = [
      { emoji: "😄", label: "Happy",     color: "#22c55e", bg: "#f0fdf4" },
      { emoji: "😊", label: "Good",      color: "#3b82f6", bg: "#eff6ff" },
      { emoji: "😐", label: "Neutral",   color: "#f59e0b", bg: "#fffbeb" },
      { emoji: "😔", label: "Sad",       color: "#8b5cf6", bg: "#f5f3ff" },
      { emoji: "😡", label: "Angry",     color: "#ef4444", bg: "#fef2f2" },
      { emoji: "😴", label: "Tired",     color: "#64748b", bg: "#f8fafc" },
    ];

    function MoodButton({ mood, isSelected, onClick }) {
      return (
        <button onClick={onClick} style={{
          display: "flex", flexDirection: "column", alignItems: "center", gap: "0.3rem",
          padding: "1rem", border: isSelected ? `3px solid ${mood.color}` : "2px solid #e2e8f0",
          borderRadius: "14px", background: isSelected ? mood.bg : "#fff",
          cursor: "pointer", transition: "all 0.2s", minWidth: "90px",
          transform: isSelected ? "scale(1.08)" : "scale(1)",
          boxShadow: isSelected ? `0 4px 16px ${mood.color}33` : "0 1px 4px rgba(0,0,0,0.04)",
        }}>
          <span style={{ fontSize: "2rem" }}>{mood.emoji}</span>
          <span style={{ fontSize: "0.82rem", fontWeight: 600, color: isSelected ? mood.color : "#64748b" }}>{mood.label}</span>
        </button>
      );
    }

    function MoodDisplay({ mood }) {
      if (!mood) return null;
      return (
        <div style={{
          marginTop: "1.5rem", padding: "1.5rem", borderRadius: "16px",
          background: mood.bg, border: `2px solid ${mood.color}`,
          textAlign: "center", transition: "all 0.3s",
        }}>
          <div style={{ fontSize: "4rem", marginBottom: "0.5rem" }}>{mood.emoji}</div>
          <div style={{ fontSize: "1.25rem", fontWeight: 700, color: mood.color }}>
            You're feeling {mood.label}
          </div>
          <div style={{ fontSize: "0.85rem", color: "#64748b", marginTop: "0.25rem" }}>
            Logged at {new Date().toLocaleTimeString()}
          </div>
        </div>
      );
    }

    function MoodHistory({ history }) {
      if (history.length === 0) return null;
      return (
        <div style={{ marginTop: "1.5rem" }}>
          <h3 style={{ fontSize: "0.95rem", color: "#334155", marginBottom: "0.5rem" }}>Today's Mood Log</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "0.5rem" }}>
            {history.map((entry, i) => (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: "0.4rem",
                padding: "0.35rem 0.75rem", background: entry.mood.bg,
                border: `1px solid ${entry.mood.color}40`, borderRadius: "20px",
                fontSize: "0.8rem", color: "#475569",
              }}>
                <span>{entry.mood.emoji}</span>
                <span>{entry.time}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [selectedMood, setSelectedMood] = useState(null);
      const [history, setHistory] = useState([]);

      const handleSelect = (mood) => {
        setSelectedMood(mood);
        setHistory(prev => [...prev, {
          mood,
          time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
        }]);
      };

      return (
        <div style={{
          fontFamily: "'Segoe UI', system-ui, sans-serif",
          background: "#f1f5f9", minHeight: "100vh",
          display: "flex", justifyContent: "center",
          padding: "2rem 1rem",
        }}>
          <div style={{ width: "100%", maxWidth: "520px" }}>
            <h1 style={{ textAlign: "center", fontSize: "1.5rem", marginBottom: "0.2rem", color: "#0f172a" }}>
              Mood Tracker
            </h1>
            <p style={{ textAlign: "center", color: "#64748b", fontSize: "0.85rem", marginBottom: "1.5rem" }}>
              Assignment — 9th March 2026
            </p>

            <div style={{
              background: "#fff", borderRadius: "16px",
              boxShadow: "0 2px 16px rgba(0,0,0,0.06)", padding: "1.5rem",
            }}>
              <p style={{ fontSize: "0.95rem", color: "#334155", fontWeight: 600, marginBottom: "0.75rem" }}>
                How are you feeling right now?
              </p>
              <div style={{
                display: "flex", gap: "0.6rem", flexWrap: "wrap", justifyContent: "center",
              }}>
                {moods.map((mood) => (
                  <MoodButton
                    key={mood.label}
                    mood={mood}
                    isSelected={selectedMood?.label === mood.label}
                    onClick={() => handleSelect(mood)}
                  />
                ))}
              </div>

              <MoodDisplay mood={selectedMood} />
              <MoodHistory history={history} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
