<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e3a5f, #1e293b);
        min-height: 100vh;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.2rem;
      }
      .subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
      }
      .container {
        width: 100%;
        max-width: 720px;
      }

      .search-bar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .search-bar input {
        flex: 1;
        padding: 0.7rem 1rem;
        border: none;
        border-radius: 10px;
        font-size: 0.95rem;
        outline: none;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        backdrop-filter: blur(4px);
        font-family: inherit;
      }
      .search-bar input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      .search-bar button {
        padding: 0.7rem 1.25rem;
        background: #f59e0b;
        color: #1e293b;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .search-bar button:hover {
        background: #fbbf24;
      }

      .glass {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
      }

      .loading {
        display: none;
        flex-direction: column;
        align-items: center;
        padding: 3rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-text {
        margin-top: 0.75rem;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
      }
      .error-box {
        display: none;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        text-align: center;
      }
      .error-box .err-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      .error-box .err-msg {
        font-size: 0.95rem;
        color: #fca5a5;
      }

      .hidden {
        display: none !important;
      }

      /* Current Weather */
      .current {
        padding: 1.5rem;
        text-align: center;
        margin-bottom: 1rem;
      }
      .current .icon-img {
        width: 80px;
        height: 80px;
      }
      .current .city {
        font-size: 1.2rem;
        font-weight: 600;
        margin-top: 0.15rem;
      }
      .current .region {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.5);
      }
      .current .temp {
        font-size: 3.25rem;
        font-weight: 700;
        line-height: 1.1;
        margin: 0.25rem 0;
      }
      .current .desc {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 1rem;
      }
      .current-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .current-grid .item {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 0.6rem 0.5rem;
        text-align: center;
      }
      .current-grid .item .val {
        font-size: 1rem;
        font-weight: 700;
      }
      .current-grid .item .lbl {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 0.1rem;
      }

      .section-title {
        font-size: 0.85rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 1.25rem 0 0.5rem;
        padding-left: 0.25rem;
      }

      /* Hourly Forecast */
      .hourly-scroll {
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        padding: 0.75rem;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
      }
      .hourly-scroll::-webkit-scrollbar {
        height: 4px;
      }
      .hourly-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 2px;
      }
      .hour-item {
        flex: 0 0 72px;
        text-align: center;
        padding: 0.6rem 0.25rem;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      .hour-item .time {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.5);
      }
      .hour-item .h-icon {
        width: 36px;
        height: 36px;
        margin: 0.15rem auto;
      }
      .hour-item .h-temp {
        font-size: 0.85rem;
        font-weight: 700;
      }
      .hour-item .h-rain {
        font-size: 0.65rem;
        color: #60a5fa;
        margin-top: 0.1rem;
      }

      /* Daily Forecast */
      .daily {
        padding: 0.75rem;
        margin-bottom: 1rem;
      }
      .day-row {
        display: flex;
        align-items: center;
        padding: 0.55rem 0.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .day-row:last-child {
        border-bottom: none;
      }
      .day-row .day-name {
        width: 70px;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .day-row .d-icon {
        width: 32px;
        height: 32px;
        margin: 0 0.25rem;
      }
      .day-row .d-rain {
        width: 52px;
        font-size: 0.75rem;
        color: #60a5fa;
        text-align: center;
      }
      .day-row .d-desc {
        flex: 1;
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.5);
        padding: 0 0.5rem;
      }
      .day-row .d-temps {
        width: 90px;
        text-align: right;
        font-size: 0.85rem;
      }
      .day-row .d-temps .hi {
        font-weight: 700;
      }
      .day-row .d-temps .lo {
        color: rgba(255, 255, 255, 0.4);
      }

      /* Alerts */
      .alert-box {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 0.75rem;
      }
      .alert-box .alert-event {
        font-weight: 700;
        font-size: 0.9rem;
        color: #fca5a5;
        margin-bottom: 0.2rem;
      }
      .alert-box .alert-meta {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 0.3rem;
      }
      .alert-box .alert-desc {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.5;
        max-height: 80px;
        overflow-y: auto;
      }

      .credit {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.3);
      }
      .credit a {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
      }
      .credit a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>Weather Dashboard</h1>
    <p class="subtitle">Assignment — 7th March 2026</p>

    <div class="container">
      <div class="search-bar">
        <input
          type="text"
          id="cityInput"
          placeholder="Enter city name..."
          value="Bangalore"
        />
        <button id="searchBtn">Search</button>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p class="loading-text">Fetching weather data...</p>
      </div>

      <div class="error-box" id="errorBox">
        <div class="err-icon">&#9888;&#65039;</div>
        <p class="err-msg" id="errorMsg">Something went wrong.</p>
      </div>

      <div id="dashboard" class="hidden">
        <div id="alertsSection" class="hidden">
          <div class="section-title">&#9888;&#65039; Weather Alerts</div>
          <div id="alertsList"></div>
        </div>

        <div class="current glass" id="currentCard"></div>

        <div class="section-title">Hourly Forecast</div>
        <div class="glass" style="margin-bottom: 1rem">
          <div class="hourly-scroll" id="hourlyScroll"></div>
        </div>

        <div class="section-title">3-Day Forecast</div>
        <div class="daily glass" id="dailyList"></div>

        <div class="credit">
          Powered by
          <a href="https://www.weatherapi.com/" target="_blank" rel="noopener"
            >WeatherAPI.com</a
          >
        </div>
      </div>
    </div>

    <script>
      const API_KEY = "503ea5be8aed41aa824154817261503";
      const BASE = "https://api.weatherapi.com/v1";

      const cityInput = document.getElementById("cityInput");
      const searchBtn = document.getElementById("searchBtn");

      function showState(state) {
        document.getElementById("loading").style.display =
          state === "loading" ? "flex" : "none";
        document.getElementById("errorBox").style.display =
          state === "error" ? "block" : "none";
        document
          .getElementById("dashboard")
          .classList.toggle("hidden", state !== "success");
      }

      function formatHour(timeStr) {
        const d = new Date(timeStr);
        return d.toLocaleTimeString("en-US", { hour: "numeric", hour12: true });
      }

      function formatDay(dateStr) {
        const d = new Date(dateStr + "T00:00:00");
        return d.toLocaleDateString("en-US", { weekday: "short" });
      }

      function iconUrl(path) {
        return path.startsWith("//") ? "https:" + path : path;
      }

      async function fetchWeather(city) {
        if (!city.trim()) {
          showState("error");
          document.getElementById("errorMsg").textContent =
            "Please enter a city name.";
          return;
        }
        showState("loading");

        try {
          const url = `${BASE}/forecast.json?key=${API_KEY}&q=${encodeURIComponent(city)}&days=3&alerts=yes&aqi=no`;
          const res = await fetch(url);

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error?.message || `Error ${res.status}`);
          }

          const data = await res.json();
          renderCurrent(data.location, data.current);
          renderHourly(data.forecast.forecastday);
          renderDaily(data.forecast.forecastday);
          renderAlerts(data.alerts);
          showState("success");
        } catch (err) {
          document.getElementById("errorMsg").textContent =
            err.message.charAt(0).toUpperCase() + err.message.slice(1);
          showState("error");
        }
      }

      function renderCurrent(loc, c) {
        const card = document.getElementById("currentCard");
        const items = [
          { val: `${c.feelslike_c}°C`, lbl: "Feels Like" },
          { val: `${c.humidity}%`, lbl: "Humidity" },
          { val: `${c.wind_kph} km/h`, lbl: `Wind ${c.wind_dir}` },
          { val: `${c.pressure_mb} hPa`, lbl: "Pressure" },
          { val: `${c.uv}`, lbl: "UV Index" },
          { val: `${c.vis_km} km`, lbl: "Visibility" },
          { val: `${c.dewpoint_c}°C`, lbl: "Dew Point" },
          { val: `${c.cloud}%`, lbl: "Clouds" },
        ];

        card.innerHTML = `
        <div class="current">
          <img class="icon-img" src="${iconUrl(c.condition.icon)}" alt="${c.condition.text}">
          <div class="city">${loc.name}, ${loc.country}</div>
          <div class="region">${loc.region} &middot; ${loc.localtime}</div>
          <div class="temp">${Math.round(c.temp_c)}°C</div>
          <div class="desc">${c.condition.text}</div>
          <div class="current-grid">
            ${items.map((i) => `<div class="item"><div class="val">${i.val}</div><div class="lbl">${i.lbl}</div></div>`).join("")}
          </div>
        </div>`;
      }

      function renderHourly(forecastDays) {
        const container = document.getElementById("hourlyScroll");
        const now = new Date();
        const allHours = [];

        forecastDays.forEach((day) => {
          day.hour.forEach((h) => {
            const hTime = new Date(h.time);
            if (hTime >= now) allHours.push(h);
          });
        });

        container.innerHTML = allHours
          .slice(0, 24)
          .map((h) => {
            const rain =
              h.chance_of_rain > 0
                ? `<div class="h-rain">💧${h.chance_of_rain}%</div>`
                : "";
            return `<div class="hour-item">
          <div class="time">${formatHour(h.time)}</div>
          <img class="h-icon" src="${iconUrl(h.condition.icon)}" alt="${h.condition.text}">
          <div class="h-temp">${Math.round(h.temp_c)}°</div>
          ${rain}
        </div>`;
          })
          .join("");
      }

      function renderDaily(forecastDays) {
        const container = document.getElementById("dailyList");
        container.innerHTML = forecastDays
          .map((d, i) => {
            const dayName = i === 0 ? "Today" : formatDay(d.date);
            const rain =
              d.day.daily_chance_of_rain > 0
                ? `💧${d.day.daily_chance_of_rain}%`
                : "";
            return `<div class="day-row">
          <div class="day-name">${dayName}</div>
          <img class="d-icon" src="${iconUrl(d.day.condition.icon)}" alt="${d.day.condition.text}">
          <div class="d-rain">${rain}</div>
          <div class="d-desc">${d.day.condition.text}</div>
          <div class="d-temps">
            <span class="hi">${Math.round(d.day.maxtemp_c)}°</span>
            <span class="lo"> / ${Math.round(d.day.mintemp_c)}°</span>
          </div>
        </div>`;
          })
          .join("");
      }

      function renderAlerts(alertData) {
        const section = document.getElementById("alertsSection");
        const list = document.getElementById("alertsList");
        const alerts = alertData?.alert;

        if (!alerts || alerts.length === 0) {
          section.classList.add("hidden");
          return;
        }

        section.classList.remove("hidden");
        list.innerHTML = alerts
          .map(
            (a) => `
        <div class="alert-box">
          <div class="alert-event">${a.event || a.headline}</div>
          <div class="alert-meta">${a.severity || ""} &middot; ${a.urgency || ""} &middot; Expires: ${a.expires || "N/A"}</div>
          <div class="alert-desc">${(a.desc || a.instruction || "").replace(/\n/g, "<br>")}</div>
        </div>`,
          )
          .join("");
      }

      searchBtn.addEventListener("click", () => fetchWeather(cityInput.value));
      cityInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") fetchWeather(cityInput.value);
      });

      fetchWeather(cityInput.value);
    </script>
  </body>
</html>
