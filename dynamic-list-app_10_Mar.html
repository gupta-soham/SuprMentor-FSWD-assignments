<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic List App — React Hooks</title>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function TaskItem({ task, onToggle, onDelete }) {
      return (
        <div style={{
          display: "flex", alignItems: "center", gap: "0.75rem",
          padding: "0.75rem 1rem", background: "#fff",
          border: "1px solid #e2e8f0", borderRadius: "10px",
          marginBottom: "0.5rem", transition: "all 0.2s",
        }}>
          <input
            type="checkbox" checked={task.done}
            onChange={() => onToggle(task.id)}
            style={{ width: 18, height: 18, cursor: "pointer", accentColor: "#4f46e5" }}
          />
          <span style={{
            flex: 1, fontSize: "0.95rem",
            textDecoration: task.done ? "line-through" : "none",
            color: task.done ? "#94a3b8" : "#1e293b",
            transition: "all 0.2s",
          }}>
            {task.text}
          </span>
          <button onClick={() => onDelete(task.id)} style={{
            background: "none", border: "none", color: "#ef4444",
            fontSize: "1.1rem", cursor: "pointer", padding: "0.2rem 0.4rem",
            borderRadius: "6px", transition: "background 0.2s",
          }}
          onMouseOver={e => e.target.style.background = "#fef2f2"}
          onMouseOut={e => e.target.style.background = "none"}
          >✕</button>
        </div>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([
        { id: 1, text: "Learn React hooks", done: true },
        { id: 2, text: "Build a task list app", done: false },
        { id: 3, text: "Practice useState & useRef", done: false },
      ]);
      const [input, setInput] = useState("");
      const [filter, setFilter] = useState("all");
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const addTask = (e) => {
        e.preventDefault();
        const text = input.trim();
        if (!text) return;
        setTasks(prev => [...prev, { id: Date.now(), text, done: false }]);
        setInput("");
        inputRef.current?.focus();
      };

      const toggleTask = (id) => setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
      const deleteTask = (id) => setTasks(prev => prev.filter(t => t.id !== id));

      const filtered = tasks.filter(t => {
        if (filter === "active") return !t.done;
        if (filter === "done") return t.done;
        return true;
      });

      const doneCount = tasks.filter(t => t.done).length;

      const filterBtn = (f, label) => (
        <button onClick={() => setFilter(f)} style={{
          padding: "0.35rem 0.9rem", border: "none", borderRadius: "6px",
          fontSize: "0.82rem", fontWeight: 600, cursor: "pointer",
          background: filter === f ? "#4f46e5" : "#f1f5f9",
          color: filter === f ? "#fff" : "#64748b",
          transition: "all 0.2s",
        }}>{label}</button>
      );

      return (
        <div style={{
          fontFamily: "'Segoe UI', system-ui, sans-serif",
          background: "#f1f5f9", minHeight: "100vh",
          display: "flex", justifyContent: "center", padding: "2rem 1rem",
        }}>
          <div style={{ width: "100%", maxWidth: "500px" }}>
            <h1 style={{ textAlign: "center", fontSize: "1.5rem", marginBottom: "0.2rem", color: "#0f172a" }}>
              Dynamic List App
            </h1>
            <p style={{ textAlign: "center", color: "#64748b", fontSize: "0.85rem", marginBottom: "1.5rem" }}>
              Assignment — 10th March 2026
            </p>

            <div style={{
              background: "#fff", borderRadius: "16px",
              boxShadow: "0 2px 16px rgba(0,0,0,0.06)", padding: "1.5rem",
            }}>
              <form onSubmit={addTask} style={{ display: "flex", gap: "0.5rem", marginBottom: "1rem" }}>
                <input
                  ref={inputRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  placeholder="Add a new task..."
                  style={{
                    flex: 1, padding: "0.65rem 0.85rem", border: "2px solid #e2e8f0",
                    borderRadius: "10px", fontSize: "0.9rem", outline: "none",
                    fontFamily: "inherit", transition: "border 0.2s",
                  }}
                  onFocus={e => e.target.style.borderColor = "#4f46e5"}
                  onBlur={e => e.target.style.borderColor = "#e2e8f0"}
                />
                <button type="submit" style={{
                  padding: "0.65rem 1.25rem", background: "#4f46e5", color: "#fff",
                  border: "none", borderRadius: "10px", fontWeight: 700,
                  cursor: "pointer", fontSize: "0.9rem",
                }}>Add</button>
              </form>

              <div style={{ display: "flex", gap: "0.4rem", marginBottom: "1rem" }}>
                {filterBtn("all", "All")}
                {filterBtn("active", "Active")}
                {filterBtn("done", "Done")}
              </div>

              <div>
                {filtered.length === 0 ? (
                  <p style={{ textAlign: "center", color: "#94a3b8", padding: "1.5rem", fontSize: "0.9rem" }}>
                    {filter === "all" ? "No tasks yet. Add one above!" : `No ${filter} tasks.`}
                  </p>
                ) : (
                  filtered.map(task => (
                    <TaskItem key={task.id} task={task} onToggle={toggleTask} onDelete={deleteTask} />
                  ))
                )}
              </div>

              <div style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                marginTop: "1rem", paddingTop: "0.75rem", borderTop: "1px solid #f1f5f9",
                fontSize: "0.82rem", color: "#94a3b8",
              }}>
                <span>{tasks.length} total &middot; {doneCount} done</span>
                {doneCount > 0 && (
                  <button
                    onClick={() => setTasks(prev => prev.filter(t => !t.done))}
                    style={{
                      background: "none", border: "none", color: "#ef4444",
                      fontSize: "0.82rem", cursor: "pointer", fontWeight: 600,
                    }}
                  >Clear completed</button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
